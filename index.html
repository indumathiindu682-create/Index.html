<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Best Dad Ever</title>

<style>
body {
    background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
}

h1 {
    font-size: 40px;
    margin-bottom: 20px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background-color: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background-color: #ff1e4d;
    transform: scale(1.1);
}

#message {
    margin-top: 40px;
    font-size: 30px;
    font-weight: bold;
    color: #ffd700;
}

.heart {
    position: fixed;
    color: red;
    font-size: 20px;
    animation: fall 4s linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-100px); opacity: 1; }
    100% { transform: translateY(100vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Click for a Surprise 💖</h1>
<button onclick="revealMessage()">Reveal</button>

<div id="message"></div>

<script>
const text = "You are the Best Dad Ever ❤️";
let index = 0;

function revealMessage() {
    document.getElementById("message").innerHTML = "";
    index = 0;
    typeEffect();
    createHearts();
}

function typeEffect() {
    if (index < text.length) {
        document.getElementById("message").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeEffect, 80);
    }
}

function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 4000);
    }, 300);
}
</script>

</body>
</html>
